<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style/forms.css">
    <script src="./scripts/menu.js" defer></script>
    <script type="module" src="./scripts/forms.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Lacquer&family=Love+Ya+Like+A+Sister&display=swap');
    </style>
    <title>Viajei: Criar Blog</title>
</head>

<body>
    <div id="container">
        <header>
            <img src="./images/Logo_Viajei.png" alt="Logo.Viajei" />
            <div class="toggle"></div>
            <a class="link-do-cabecalho" href="./index.html">Viajei</a>
            <a class="link-do-cabecalho" href="./about.html">Sobre</a>
            <a class="link-do-cabecalho" href="./forms.html">Crie seu blog!</a>
        </header>
        <section>
            <form id="post-form">
                <label for="autor"> Autor: </label>
                <input id="autor" type="text" name="autor" placeholder="Fulano de Tal">

                <label for="titulo"> Título: </label>
                <input id="titulo" type="text" name="titulo" placeholder="pensando ilimitado">

                <label for="email"> Email: </label>
                <input id="email" type="email" name="email" placeholder="fulano123@example.com">

                <label for="historia"> Sua História: </label><br>
                <textarea id="historia" cols="20" rows="10" name="historia"></textarea>

                <button type="submit"> Enviar </button>

            </form>
            <div id="historias"></div>
        </section>

        <dialog id="modal">
            <button autofocus>Fechar</button>
            <div id="modal-content"></div>
        </dialog>

        <footer>
            <div id="historias"></div>
        </footer>
    </div>
</body>


</html>
